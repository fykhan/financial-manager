<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GradPlan · Financial Planner</title>
  <meta name="description" content="A personal financial planner for newly graduated students: income, expenses, installments, subscriptions and savings with automatic calculations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
</head>
<body>
  <div id="app" class="app">
    <!-- Sidebar navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark">₲</span>
        <div class="brand-text">
          <strong>GradPlan</strong>
          <small>Financial planner</small>
        </div>
      </div>
      <nav class="nav" id="nav">
        <div class="nav-group-label">Track</div>
        <button class="nav-item" data-view="dashboard" aria-current="true">
          <span class="nav-ico">◧</span> Dashboard
        </button>
        <button class="nav-item" data-view="transactions">
          <span class="nav-ico">▤</span> Transactions
        </button>
        <button class="nav-item" data-view="accounts">
          <span class="nav-ico">◈</span> Accounts
        </button>

        <div class="nav-group-label">Plan</div>
        <button class="nav-item" data-view="income">
          <span class="nav-ico">↗</span> Income
        </button>
        <button class="nav-item" data-view="expenses">
          <span class="nav-ico">↘</span> Expenses
        </button>
        <button class="nav-item" data-view="installments">
          <span class="nav-ico">◫</span> Installments
        </button>
        <button class="nav-item" data-view="subscriptions">
          <span class="nav-ico">⟳</span> Subscriptions
        </button>
        <button class="nav-item" data-view="savings">
          <span class="nav-ico">◎</span> Savings
        </button>
        <button class="nav-item" data-view="debts">
          <span class="nav-ico">⇄</span> Debts
        </button>

        <div class="nav-group-label">Report</div>
        <button class="nav-item" data-view="statement">
          <span class="nav-ico">▦</span> Statement
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" id="btn-theme" title="Toggle light / dark">◐ Theme</button>
        <button class="btn btn-ghost btn-sm" id="btn-data" title="Import / export / reset">⚙ Data</button>
        <button class="btn btn-ghost btn-sm" id="btn-logout" title="Log out">⏻ Log out</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <button class="btn btn-ghost btn-sm menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
        <h1 class="view-title" id="view-title">Dashboard</h1>
        <div class="topbar-actions">
          <label class="field-inline" title="Display currency (no conversion)">
            <select id="currency-select" class="input input-sm"></select>
          </label>
          <button class="btn btn-sm" id="btn-add-primary">+ Add</button>
          <button class="btn btn-primary btn-sm" id="btn-log-txn">+ Log</button>
        </div>
      </header>

      <div class="view-container" id="view-container"><!-- views render here --></div>
    </main>
  </div>

  <!-- Mobile quick-add FAB (superseded by the bottom nav's center + on small screens) -->
  <button class="fab" id="fab-log" aria-label="Log transaction" title="Log transaction">+</button>

  <!-- Mobile bottom tab bar (shown < 900px; supersedes the FAB) -->
  <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
    <button class="bottom-nav-item" data-view="dashboard" aria-current="true">
      <span class="bottom-nav-ico">◧</span><span class="bottom-nav-label">Home</span>
    </button>
    <button class="bottom-nav-item" data-view="transactions">
      <span class="bottom-nav-ico">▤</span><span class="bottom-nav-label">Txns</span>
    </button>
    <button class="bottom-nav-item bottom-nav-log" id="bnav-log" aria-label="Log transaction">
      <span class="bottom-nav-log-plus">+</span>
    </button>
    <button class="bottom-nav-item" data-view="statement">
      <span class="bottom-nav-ico">▦</span><span class="bottom-nav-label">Report</span>
    </button>
    <button class="bottom-nav-item" id="bnav-more" aria-label="More">
      <span class="bottom-nav-ico">☰</span><span class="bottom-nav-label">More</span>
    </button>
  </nav>

  <!-- Modal host -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title">Add</h2>
        <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast host -->
  <div class="toast-host" id="toast-host" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
